when:
  - event: push
    branch: main
  - event: tag
  - event: manual

steps:
  - name: fmt
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - git config --global url."http://x-access-token:$GIT_AUTH_TOKEN@100.92.54.45:3002/".insteadOf "http://100.92.54.45:3002/"
      - printf '[registries.forgejo]\nindex = "sparse+https://repo.indexarr.net/api/packages/indexarr/cargo/"\ncredential-provider = "cargo:token"\n\n[registry]\ndefault = "forgejo"\n' > $CARGO_HOME/config.toml
      - printf '[registries.forgejo]\ntoken = "Bearer %s"\n' "$GIT_AUTH_TOKEN" > $CARGO_HOME/credentials.toml
      - rustup component add rustfmt
      - cargo fmt --all -- --check

  - name: check
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - git config --global url."http://x-access-token:$GIT_AUTH_TOKEN@100.92.54.45:3002/".insteadOf "http://100.92.54.45:3002/"
      - printf '[registries.forgejo]\nindex = "sparse+https://repo.indexarr.net/api/packages/indexarr/cargo/"\ncredential-provider = "cargo:token"\n\n[registry]\ndefault = "forgejo"\n' > $CARGO_HOME/config.toml
      - printf '[registries.forgejo]\ntoken = "Bearer %s"\n' "$GIT_AUTH_TOKEN" > $CARGO_HOME/credentials.toml
      - cargo check --workspace

  - name: test
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - git config --global url."http://x-access-token:$GIT_AUTH_TOKEN@100.92.54.45:3002/".insteadOf "http://100.92.54.45:3002/"
      - printf '[registries.forgejo]\nindex = "sparse+https://repo.indexarr.net/api/packages/indexarr/cargo/"\ncredential-provider = "cargo:token"\n\n[registry]\ndefault = "forgejo"\n' > $CARGO_HOME/config.toml
      - printf '[registries.forgejo]\ntoken = "Bearer %s"\n' "$GIT_AUTH_TOKEN" > $CARGO_HOME/credentials.toml
      - cargo test --workspace

  - name: clippy
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - git config --global url."http://x-access-token:$GIT_AUTH_TOKEN@100.92.54.45:3002/".insteadOf "http://100.92.54.45:3002/"
      - printf '[registries.forgejo]\nindex = "sparse+https://repo.indexarr.net/api/packages/indexarr/cargo/"\ncredential-provider = "cargo:token"\n\n[registry]\ndefault = "forgejo"\n' > $CARGO_HOME/config.toml
      - printf '[registries.forgejo]\ntoken = "Bearer %s"\n' "$GIT_AUTH_TOKEN" > $CARGO_HOME/credentials.toml
      - rustup component add clippy
      - cargo clippy --workspace -- -D warnings

  - name: build-linux
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - git config --global url."http://x-access-token:$GIT_AUTH_TOKEN@100.92.54.45:3002/".insteadOf "http://100.92.54.45:3002/"
      - printf '[registries.forgejo]\nindex = "sparse+https://repo.indexarr.net/api/packages/indexarr/cargo/"\ncredential-provider = "cargo:token"\n\n[registry]\ndefault = "forgejo"\n' > $CARGO_HOME/config.toml
      - printf '[registries.forgejo]\ntoken = "Bearer %s"\n' "$GIT_AUTH_TOKEN" > $CARGO_HOME/credentials.toml
      - if [ -n "$CI_COMMIT_TAG" ]; then export CARGO_PROFILE_RELEASE_LTO=fat CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 CARGO_PROFILE_RELEASE_STRIP=symbols; fi
      - cargo build --release
      - ls -lh target/release/rustnzb
      - if [ -n "$CI_COMMIT_TAG" ]; then cargo install cargo-deb --registry crates-io && cargo deb --no-build --no-strip -o target/release/rustnzb_amd64.deb && ls -lh target/release/rustnzb_amd64.deb; fi

  - name: build-windows
    image: rust:1.88-bookworm
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - apt-get update && apt-get install -y --no-install-recommends clang llvm lld
      - git config --global url."http://x-access-token:$GIT_AUTH_TOKEN@100.92.54.45:3002/".insteadOf "http://100.92.54.45:3002/"
      - printf '[registries.forgejo]\nindex = "sparse+https://repo.indexarr.net/api/packages/indexarr/cargo/"\ncredential-provider = "cargo:token"\n\n[registry]\ndefault = "forgejo"\n' > $CARGO_HOME/config.toml
      - printf '[registries.forgejo]\ntoken = "Bearer %s"\n' "$GIT_AUTH_TOKEN" > $CARGO_HOME/credentials.toml
      - cargo install cargo-xwin@0.18.6 --index https://github.com/rust-lang/crates.io-index
      - rustup target add x86_64-pc-windows-msvc
      - if [ -n "$CI_COMMIT_TAG" ]; then export CARGO_PROFILE_RELEASE_LTO=fat CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1 CARGO_PROFILE_RELEASE_STRIP=symbols; fi
      - cargo xwin build --release --target x86_64-pc-windows-msvc
      - ls -lh target/x86_64-pc-windows-msvc/release/rustnzb.exe

  - name: publish-release
    image: alpine:3.21
    when:
      - event: tag
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - apk add --no-cache openssh-client coreutils
      - mkdir -p ~/.ssh
      - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - ssh-keyscan -H 100.92.4.57 >> ~/.ssh/known_hosts 2>/dev/null
      - echo "Publishing release $CI_COMMIT_TAG"
      - cp target/release/rustnzb "rustnzb-$CI_COMMIT_TAG-linux-x86_64"
      - cp target/x86_64-pc-windows-msvc/release/rustnzb.exe "rustnzb-$CI_COMMIT_TAG-windows-x86_64.exe"
      - cp target/release/rustnzb_amd64.deb "rustnzb-$CI_COMMIT_TAG-amd64.deb" 2>/dev/null || true
      - sha256sum rustnzb-$CI_COMMIT_TAG-* > "SHA256SUMS-$CI_COMMIT_TAG.txt"
      - ssh -o StrictHostKeyChecking=accept-new root@100.92.4.57 "mkdir -p /root/downloads/rustnzb/$CI_COMMIT_TAG"
      - scp -o StrictHostKeyChecking=accept-new rustnzb-$CI_COMMIT_TAG-* SHA256SUMS-$CI_COMMIT_TAG.txt root@100.92.4.57:/root/downloads/rustnzb/$CI_COMMIT_TAG/
      - ssh -o StrictHostKeyChecking=accept-new root@100.92.4.57 "cd /root/downloads/rustnzb/$CI_COMMIT_TAG && ln -sf rustnzb-$CI_COMMIT_TAG-linux-x86_64 rustnzb-linux-x86_64 && ln -sf rustnzb-$CI_COMMIT_TAG-windows-x86_64.exe rustnzb-windows-x86_64.exe"
      - ssh -o StrictHostKeyChecking=accept-new root@100.92.4.57 "cd /root/downloads/rustnzb && rm -rf latest && ln -s $CI_COMMIT_TAG latest"
      - echo "Published https://dl.rustnzb.dev/latest/"

  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: push
    settings:
      repo: repo.indexarr.net/indexarr/rustnzbd
      registry: repo.indexarr.net
      username:
        from_secret: git_auth_token
      password:
        from_secret: git_auth_token
      tag: latest
      build_args_from_env:
        - PLUGIN_PASSWORD

  - name: build-and-push-release
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: tag
    settings:
      repo: repo.indexarr.net/indexarr/rustnzbd
      registry: repo.indexarr.net
      username:
        from_secret: git_auth_token
      password:
        from_secret: git_auth_token
      tag: ["${CI_COMMIT_TAG}", latest]
      build_args:
        - RELEASE_OPTIMIZED=true
      build_args_from_env:
        - PLUGIN_PASSWORD

  - name: push-ghcr
    image: woodpeckerci/plugin-docker-buildx
    when:
      - event: tag
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    settings:
      repo: ghcr.io/ausagentsmith-org/rustnzb
      registry: ghcr.io
      username: AusAgentSmith
      password:
        from_secret: gh_release_token
      tag: ["${CI_COMMIT_TAG}", "latest", "alpha"]
      build_args:
        - RELEASE_OPTIMIZED=true
      build_args_from_env:
        - GIT_AUTH_TOKEN

  - name: discord-success
    image: alpine/curl
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo $CI_COMMIT_SHA | head -c 7)
        curl -sf -H "Content-Type: application/json" -d "{
          \"embeds\": [{
            \"title\": \"Build Successful\",
            \"description\": \"**${CI_REPO}** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",
            \"color\": 5025616,
            \"footer\": {\"text\": \"$CI_REPO • $CI_COMMIT_AUTHOR\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [success]

  - name: discord-failure
    image: alpine/curl
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo $CI_COMMIT_SHA | head -c 7)
        curl -sf -H "Content-Type: application/json" -d "{
          \"embeds\": [{
            \"title\": \"Build Failed\",
            \"description\": \"**${CI_REPO}** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",
            \"color\": 15548997,
            \"footer\": {\"text\": \"$CI_REPO • $CI_COMMIT_AUTHOR\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [failure]
