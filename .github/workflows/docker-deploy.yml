name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: [self-hosted, node-b]
    name: Compile & Test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2-self-hosted

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Compile check
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace --lib

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  build-and-publish:
    runs-on: [self-hosted, node-b]
    needs: check
    if: github.event_name != 'pull_request'
    name: Build & Push Docker Image

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/ausagentsmith-org/rustnzb
            ${{ vars.DOCKERHUB_USERNAME }}/rustnzb
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-test:
    runs-on: [self-hosted, node-b]
    needs: build-and-publish
    name: Docker Smoke Test

    permissions:
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          IMAGE="ghcr.io/ausagentsmith-org/rustnzb:${{ github.sha }}"
          echo "==> Pulling ${IMAGE}..."
          docker pull "${IMAGE}"

      - name: Smoke test
        run: docker run --rm --entrypoint rustnzb "ghcr.io/ausagentsmith-org/rustnzb:${{ github.sha }}" --smoke-test

      - name: Test PUID/PGID (1234:5678 via s6-overlay)
        run: |
          IMAGE="ghcr.io/ausagentsmith-org/rustnzb:${{ github.sha }}"
          CID=$(docker run -d -e PUID=1234 -e PGID=5678 "$IMAGE")
          sleep 5  # wait for s6 init
          UID_VAL=$(docker exec "$CID" id -u abc)
          GID_VAL=$(docker exec "$CID" id -g abc)
          echo "UID=$UID_VAL GID=$GID_VAL"
          [ "$UID_VAL" = "1234" ] && [ "$GID_VAL" = "5678" ] || { docker stop "$CID" >/dev/null; docker rm "$CID" >/dev/null; echo "FAIL: custom PUID/PGID"; exit 1; }
          OWNER=$(docker exec "$CID" stat -c "%u:%g" /config)
          echo "Owner=$OWNER"
          docker stop "$CID" >/dev/null && docker rm "$CID" >/dev/null
          [ "$OWNER" = "1234:5678" ] || { echo "FAIL: /config not owned by PUID:PGID"; exit 1; }

  deploy:
    runs-on: [self-hosted, node-b]
    needs: [build-and-publish, container-test]
    name: Deploy

    steps:
      - name: Deploy
        run: |
          set -e
          echo "==> Pulling latest image..."
          docker pull ${{ vars.DOCKERHUB_USERNAME }}/rustnzb:latest
          echo "==> Restarting container..."
          docker restart rustnzbd 2>/dev/null || echo "Container 'rustnzbd' not running — pull complete, restart via Portainer"
          echo "==> Pruning old images..."
          docker image prune -f
          echo "==> Deployment complete."
