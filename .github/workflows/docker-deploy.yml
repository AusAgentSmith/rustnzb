name: Build, Publish & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: [self-hosted, node-b]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/ausagentsmith/rustnzbd
            ${{ vars.DOCKERHUB_USERNAME }}/rustnzbd
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-test:
    runs-on: [self-hosted, node-b]
    needs: build-and-publish

    permissions:
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test - external tools work in runtime image
        run: |
          set -e
          IMAGE="ghcr.io/ausagentsmith/rustnzbd:${{ github.sha }}"
          echo "==> Pulling image ${IMAGE}..."
          docker pull "${IMAGE}"
          echo "==> Running smoke tests inside container..."
          docker run --rm "${IMAGE}" --smoke-test

  deploy:
    runs-on: [self-hosted, node-b]
    needs: [build-and-publish, container-test]

    steps:
      - name: Deploy
        run: |
          set -e
          cd ~/rustnzbd
          echo "==> Pulling latest image..."
          docker compose pull
          echo "==> Deploying container..."
          docker compose up -d
          echo "==> Pruning old images..."
          docker image prune -f
          echo "==> Waiting for service..."
          sleep 5
          docker compose ps
          echo "==> Deployment complete."
