when:
  - event: push
    branch: main

steps:
  - name: deploy
    image: alpine:3.21
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - apk add --no-cache openssh-client
      - mkdir -p ~/.ssh
      - echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - ssh-keyscan -H 100.92.4.57 >> ~/.ssh/known_hosts 2>/dev/null
      - ssh -o StrictHostKeyChecking=accept-new root@100.92.4.57 "cd ~/websites/rustnzbd && git pull --ff-only"
